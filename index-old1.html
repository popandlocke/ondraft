<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Market Plinko Prototype</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f2f2f7; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: #1c1c1e; 
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }

        /* Top Control Bar */
        #controls {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            width: 100%;
            max-width: 600px;
            padding: 15px;
            box-sizing: border-box;
            z-index: 10;
        }

        .column-left { display: flex; align-items: center; }
        .column-center { display: flex; justify-content: center; align-items: center; }
        .column-right { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }

        /* Button Styling */
        button {
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.15s ease;
            touch-action: manipulation;
        }
        button:hover { opacity: 0.85; }
        button:active { transform: scale(0.98); }

        .btn-drop {
            background-color: #007aff; 
            color: white;
            padding: 14px 28px;
            font-size: 18px;
        }

        .btn-utility {
            background-color: #e5e5ea; 
            color: #ff3b30; 
            padding: 8px 16px;
            font-size: 13px;
            width: 110px;
        }
        .btn-utility.reset { color: #ff9500; }

        /* Canvas Wrapper maintaining 3:4 Aspect Ratio */
        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 3 / 4;
            background-color: #ffffff; 
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div id="controls">
        <div class="column-left"></div>
        <div class="column-center">
            <button class="btn-drop" onclick="dropBall()">Drop Ball</button>
        </div>
        <div class="column-right">
            <button class="btn-utility" onclick="clearBalls()">Clear Balls</button>
            <button class="btn-utility reset" onclick="resetFlaps()">Reset Flaps</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- Configuration & Constants ---
        const WIDTH = 600;
        const HEIGHT = 800;
        const BALL_RADIUS = 10;
        const PEG_RADIUS = 6.3; 
        const TOTAL_ROWS = 8;
        
        const RESTITUTION = 0.4; 
        const FRICTION = 0.05;
        const GRAVITY = 1.0;

        // --- Matter.js Setup ---
        const { Engine, Render, Runner, Bodies, Composite, Body, Vector, Events } = Matter;
        
        const engine = Engine.create({ gravity: { y: GRAVITY } });
        const container = document.getElementById('canvas-container');
        
        const render = Render.create({
            element: container,
            engine: engine,
            options: {
                width: WIDTH,
                height: HEIGHT,
                wireframes: false, 
                background: '#ffffff' 
            }
        });

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // --- Geometry Calculations ---
        const baseFrameThickness = 20;
        const sideWallThickness = 10; 
        const troughCount = 9;
        const troughWidth = (WIDTH - sideWallThickness) / troughCount;
        
        const topPegX = WIDTH / 2;
        const topPegY = HEIGHT * 0.18; 
        const spacingX = 64; 
        const spacingY = 56; 

        const lowestPegY = topPegY + (TOTAL_ROWS - 1) * spacingY;
        const safetyGap = 50;
        const dividerTopY = lowestPegY + safetyGap;

        const floorY = HEIGHT - baseFrameThickness;
        const innerWallHeight = floorY - dividerTopY;

        const transitionY = HEIGHT * 0.65; 
        const fullTroughHeight = HEIGHT - transitionY;

        let marketPegs = []; 
        let activeBalls = [];

        // --- Build Board Components ---

        function buildFrame() {
            const wallOptions = { isStatic: true, render: { fillStyle: '#d1d1d6' } };
            
            Composite.add(engine.world, Bodies.rectangle(WIDTH/2, HEIGHT - baseFrameThickness/2, WIDTH, baseFrameThickness, wallOptions));
            Composite.add(engine.world, Bodies.rectangle(sideWallThickness/2, (HEIGHT + transitionY)/2, sideWallThickness, fullTroughHeight, wallOptions));
            Composite.add(engine.world, Bodies.rectangle(WIDTH - sideWallThickness/2, (HEIGHT + transitionY)/2, sideWallThickness, fullTroughHeight, wallOptions));

            for (let i = 1; i < troughCount; i++) {
                const x = sideWallThickness/2 + i * troughWidth;
                const y = floorY - (innerWallHeight / 2);
                Composite.add(engine.world, Bodies.rectangle(x, y, 4, innerWallHeight, { isStatic: true, render: { fillStyle: '#e5e5ea' } }));
            }

            const wallOffset = spacingX * 0.5;
            const funnelTopY = topPegY - 40;
            
            const leftWallPath = [
                { x: sideWallThickness/2, y: transitionY },
                { x: topPegX - wallOffset, y: funnelTopY },
                { x: topPegX - wallOffset - 10, y: funnelTopY },
                { x: sideWallThickness/2 - 10, y: transitionY }
            ];
            const rightWallPath = [
                { x: WIDTH - sideWallThickness/2, y: transitionY },
                { x: topPegX + wallOffset, y: funnelTopY },
                { x: topPegX + wallOffset + 10, y: funnelTopY },
                { x: WIDTH - sideWallThickness/2 + 10, y: transitionY }
            ];

            Composite.add(engine.world, [
                Bodies.fromVertices((sideWallThickness/2 + topPegX - wallOffset)/2, (transitionY + funnelTopY)/2, leftWallPath, wallOptions),
                Bodies.fromVertices((WIDTH - sideWallThickness/2 + topPegX + wallOffset)/2, (transitionY + funnelTopY)/2, rightWallPath, wallOptions)
            ]);
        }

        // --- Capsule-Flap Peg Class ---
        class MarketPeg {
            constructor(x, y) {
                this.originX = x;
                this.originY = y;
                this.state = 0; 
                this.angles = [0, -20 * (Math.PI / 180), 20 * (Math.PI / 180)];
                
                this.currentVisualAngle = 0;
                this.animationSpeed = 0.22; 

                const rodLength = 24;  
                const rodWidth = 6;    

                const invisibleOptions = { isStatic: true, render: { fillStyle: 'transparent', strokeStyle: 'transparent' } };

                this.peg = Bodies.circle(x, y, PEG_RADIUS, invisibleOptions);
                this.flapStem = Bodies.rectangle(x, y - rodLength/2, rodWidth, rodLength, invisibleOptions);
                this.flapTip = Bodies.circle(x, y - rodLength, rodWidth/2, invisibleOptions);
                
                this.body = Body.create({
                    parts: [this.peg, this.flapStem, this.flapTip],
                    isStatic: true,
                    render: { visible: true }
                });

                this.body.render.element = (ctx) => {
                    const targetAngle = this.body.angle;
                    this.currentVisualAngle += (targetAngle - this.currentVisualAngle) * this.animationSpeed;

                    ctx.save();
                    ctx.translate(this.originX, this.originY);
                    ctx.rotate(this.currentVisualAngle);

                    // 1. Sleek yellow upward rod with rounded top
                    ctx.beginPath();
                    ctx.lineWidth = rodWidth;
                    ctx.lineCap = 'round';
                    ctx.strokeStyle = '#ffcc00'; 
                    ctx.moveTo(0, 0);
                    ctx.lineTo(0, -rodLength);
                    ctx.stroke();

                    // 2. Outlined white peg base head
                    ctx.beginPath();
                    ctx.arc(0, 0, PEG_RADIUS, 0, 2 * Math.PI);
                    ctx.fillStyle = '#8e8e93'; 
                    ctx.fill();
                    
                    ctx.beginPath();
                    ctx.arc(0, 0, PEG_RADIUS - 1.5, 0, 2 * Math.PI);
                    ctx.fillStyle = '#ffffff'; 
                    ctx.fill();

                    ctx.restore();
                };

                Composite.add(engine.world, this.body);
            }

            cycleState() {
                this.state = (this.state + 1) % 3;
                Body.setAngle(this.body, this.angles[this.state]);
            }

            reset() {
                this.state = 0;
                Body.setAngle(this.body, 0);
            }
        }

        function buildPegGrid() {
            for (let row = 0; row < TOTAL_ROWS; row++) {
                const pegsInRow = row + 1;
                const rowWidth = (pegsInRow - 1) * spacingX;
                const startX = (WIDTH - rowWidth) / 2;
                const y = topPegY + row * spacingY;

                for (let col = 0; col < pegsInRow; col++) {
                    const x = startX + col * spacingX;
                    marketPegs.push(new MarketPeg(x, y));
                }
            }
        }

        // --- Interactions ---

        function dropBall() {
            const randomXOffset = (Math.random() - 0.5) * 12; 
            const spawnX = WIDTH / 2 + randomXOffset;
            const spawnY = topPegY - 65;

            const ball = Bodies.circle(spawnX, spawnY, BALL_RADIUS, {
                restitution: RESTITUTION,
                friction: FRICTION,
                render: { fillStyle: '#ff2d55' } 
            });

            const randomForceX = (Math.random() - 0.5) * 0.002;
            Body.applyForce(ball, ball.position, { x: randomForceX, y: 0 });

            activeBalls.push(ball);
            Composite.add(engine.world, ball);
        }

        function clearBalls() {
            activeBalls.forEach(ball => Composite.remove(engine.world, ball));
            activeBalls = [];
        }

        function resetFlaps() {
            marketPegs.forEach(peg => peg.reset());
        }

        // --- Unified Coordinate Resolver ---
        function handleInteraction(clientX, clientY) {
            const canvasElement = render.canvas;
            if (!canvasElement) return; // Guard clause against un-rendered states
            
            const rect = canvasElement.getBoundingClientRect();
            const clickX = ((clientX - rect.left) / (rect.right - rect.left)) * WIDTH;
            const clickY = ((clientY - rect.top) / (rect.bottom - rect.top)) * HEIGHT;

            marketPegs.forEach(marketPeg => {
                const distance = Vector.magnitude(Vector.sub({ x: clickX, y: clickY }, { x: marketPeg.originX, y: marketPeg.originY }));
                if (distance < 32) { 
                    marketPeg.cycleState();
                }
            });
        }

        // --- Initialization Execution Loop ---
        buildFrame();
        buildPegGrid();

        Events.on(render, 'afterRender', () => {
            const ctx = render.context;
            marketPegs.forEach(marketPeg => {
                if (marketPeg.body.render.element) {
                    marketPeg.body.render.element(ctx);
                }
            });
        });

        // --- Deferred Event Listeners Mounted Post-Canvas Creation ---
        window.addEventListener('mousedown', (e) => {
            handleInteraction(e.clientX, e.clientY);
        });

        window.addEventListener('touchstart', (e) => {
            if (e.touches && e.touches[0]) {
                if (render.canvas && e.target === render.canvas) {
                    e.preventDefault();
                }
                handleInteraction(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: false });

    </script>
</body>
</html>
